<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Employee Login</title>

<style>
html, body {
	height: 100%;
	margin: 0;
}

body {
	display: flex;
	justify-content: center;
	align-items: center;
	font-family: Arial, sans-serif;
	background: #f2f2f2;
}

/* LOGIN BOX */
.login-box {
	width: 320px;
	padding: 30px;
	background: white;
	border-radius: 10px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
	text-align: center;
}

input {
	width: 100%;
	padding: 10px;
	margin: 10px 0;
	border: 1px solid #ccc;
	border-radius: 5px;
}

button {
	width: 100%;
	padding: 10px;
	background: #007bff;
	color: white;
	border: none;
	border-radius: 5px;
	cursor: pointer;
}

button:hover {
	background: #0056b3;
}

/* ERROR MESSAGE */
.error {
	color: red;
	margin-bottom: 10px;
}
</style>

</head>

<body>

	<div class="login-box">

		<h2>Employee Login</h2>

		<!-- ERROR (optional Spring Security) -->
		<p th:if="${param.error}" class="error">Invalid Email or Password
		</p>

		<p th:if="${param.logout}" class="error" style="color: green;">
			Logged out successfully</p>

		<form th:action="@{/login}" method="post">

			<input type="text" name="username" placeholder="Email" required>

			<input type="password" name="password" placeholder="Password"
				required>

			<button type="submit">Login</button>

		</form>

	</div>

</body>
</html>
